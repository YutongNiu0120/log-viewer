<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Viewer</title>
  <link rel="stylesheet" href="/styles.css?v=20260429a">
</head>
<body>
<div class="app-shell">
  <header class="topbar">
    <div class="topbar-left">
      <div class="brand-inline">
        <div class="brand-title">Log Viewer</div>
        <div class="brand-sub">Read-Only Remote Logs</div>
      </div>
      <div class="topbar-controls">
        <select id="serverSelect"></select>
        <button id="refreshProjectsBtn" class="btn-info" title="刷新项目树">刷新项目</button>
        <button id="testConnBtn" class="btn-secondary" title="测试连接">连通测试</button>
        <button id="configBtn" class="btn-icon btn-ghost" title="服务器配置" aria-label="服务器配置">⚙</button>
        <span id="statusPill" class="pill">未连接</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="context-line">
        <span class="ctx-label">项目</span><span id="currentProjectLabel">-</span>
      </div>
      <div hidden aria-hidden="true">
        <span id="currentFileLabel">-</span>
        <span id="currentLogTypeLabel">-</span>
      </div>
    </div>
  </header>

  <section id="appBody" class="app-body">
    <aside class="sidebar">
      <section class="panel">
        <div class="panel-title">项目筛选</div>
        <div class="row">
          <select id="l1Filter">
            <option value="">全部一级目录</option>
          </select>
        </div>
        <input id="projectFilter" type="text" placeholder="按项目名过滤...">
      </section>

      <section class="panel panel-grow">
        <div class="panel-title">项目树</div>
        <div class="muted small">星标项目可拖拽排序</div>
        <div id="projectTree" class="project-tree"></div>
      </section>
    </aside>

    <div id="sidebarResizer" class="sidebar-resizer" role="separator" aria-label="调整左侧宽度" title="拖拽调整左侧宽度"></div>

    <main class="main">
      <div class="log-pane">
        <div class="log-tabs-wrap">
          <div class="log-tabs-head">
            <div id="logTabs" class="log-tabs"></div>
            <div class="log-tabs-actions">
              <button id="closeRightTabsBtn" class="btn-ghost" type="button">关右侧</button>
              <button id="closeOtherTabsBtn" class="btn-ghost" type="button">关其他</button>
            </div>
          </div>
        </div>
        <div class="log-toolbar">
          <div class="log-toolbar-left">
            <span id="modePill" class="pill mode-pill">未选择项目</span>
            <label class="switch-inline" title="实时追踪开关">
              <input id="realtimeSwitch" type="checkbox">
              <span>实时</span>
            </label>
            <button id="clearViewerBtn" class="btn-ghost" type="button">清屏</button>
            <button id="backToBottomBtn" class="btn-info" hidden>底部</button>
          </div>
          <div class="log-toolbar-right">
            <div class="font-stepper">
              <span class="muted small">字号</span>
              <button id="logFontDownBtn" type="button" title="减小字号">−</button>
              <span id="logFontSizeLabel" class="muted small">12px</span>
              <button id="logFontUpBtn" type="button" title="增大字号">+</button>
            </div>
          </div>
        </div>
        <div id="logViewer" class="log-viewer">
          <div id="logContent"></div>
        </div>
      </div>
    </main>

    <aside id="filterDrawer" class="filter-drawer">
      <div class="drawer-head">
        <div class="drawer-head-copy">
          <div class="panel-title">日志搜索</div>
          <div class="drawer-head-hint">输入条件后查看结果</div>
        </div>
        <button id="drawerToggleBtn" class="btn-icon btn-ghost drawer-toggle-btn" type="button" title="折叠筛选" aria-label="折叠筛选" aria-expanded="true">›</button>
      </div>
      <div class="drawer-content">
        <div class="search-panel">
          <section class="drawer-group">
            <div class="drawer-group-title"><span>日志来源</span></div>
            <div class="drawer-field">
              <div class="field-label inline-label">日志类型：</div>
              <div class="row file-type-tabs" id="fileTypeTabs">
                <button type="button" class="file-type-tab active" data-log-type="normal">业务日志</button>
                <button type="button" class="file-type-tab" data-log-type="error">异常日志</button>
              </div>
            </div>
            <div class="drawer-field">
              <div class="field-label inline-label">日志文件：</div>
              <div class="row row-wrap source-file-row">
                <select id="fileSelect"></select>
                <button id="openLatestBtn" class="btn-secondary" type="button">最新</button>
              </div>
              <input id="fileFilter" type="text" placeholder="文件名过滤">
            </div>
            <div id="fileMeta" class="muted small"></div>
          </section>

          <section class="drawer-group">
            <div class="drawer-group-title"><span>搜索条件</span></div>
            <div class="drawer-field drawer-field-inline">
              <div class="field-label inline-label">搜索模式：</div>
              <div class="row row-wrap search-mode-tabs" id="searchModeTabs" role="radiogroup" aria-label="搜索模式">
                <button type="button" class="search-mode-tab active" data-search-panel="history" role="radio" aria-checked="true">
                  <span class="choice-indicator" aria-hidden="true"></span>
                  <span>历史搜索</span>
                </button>
                <button type="button" class="search-mode-tab" data-search-panel="realtime" role="radio" aria-checked="false">
                  <span class="choice-indicator" aria-hidden="true"></span>
                  <span>实时监控</span>
                </button>
              </div>
            </div>

            <section id="historySearchPanel" class="search-mode-panel">
              <div class="drawer-field">
                <div class="field-label">关键词</div>
                <div class="row search-input-row">
                  <input id="searchKeyword" type="text" placeholder="输入关键词">
                  <button id="searchBtn" class="btn-primary search-submit-btn" title="搜索历史" aria-label="搜索历史">搜索</button>
                </div>
              </div>
              <div class="drawer-field">
                <div class="field-label">最近搜索</div>
                <select id="searchRecentSelect">
                  <option value="">暂无最近搜索</option>
                </select>
              </div>
              <div class="drawer-field drawer-field-inline drawer-field-compact">
                <div class="field-label inline-label">快捷关键词：</div>
                <div class="row row-wrap search-presets">
                  <button type="button" class="btn-ghost search-preset-btn" data-search-preset="ERROR">ERROR</button>
                  <button type="button" class="btn-ghost search-preset-btn" data-search-preset="Exception">Exception</button>
                  <button type="button" class="btn-ghost search-preset-btn" data-search-preset="timeout">timeout</button>
                  <button type="button" class="btn-ghost search-preset-btn" data-search-preset="OOM">OOM</button>
                </div>
              </div>
              <div class="drawer-field">
                <div class="field-label">时间范围：</div>
                <div id="searchDateRangeRow" class="row row-wrap search-date-range-row">
                  <input id="searchDateStart" class="search-date-input" type="time" step="1" aria-label="开始时间">
                  <span class="search-date-separator" aria-hidden="true">至</span>
                  <input id="searchDateEnd" class="search-date-input" type="time" step="1" aria-label="结束时间">
                  <button id="searchDateCurrentBtn" class="btn-secondary search-date-current-btn" type="button">清空</button>
                </div>
                <div class="row row-wrap search-time-presets">
                  <button type="button" class="btn-ghost search-time-preset-btn" data-search-time-preset="15m">近15分钟</button>
                  <button type="button" class="btn-ghost search-time-preset-btn" data-search-time-preset="1h">近1小时</button>
                  <button type="button" class="btn-ghost search-time-preset-btn" data-search-time-preset="4h">近4小时</button>
                </div>
                <div id="searchDateRangeHint" class="muted small search-date-range-hint" hidden></div>
              </div>
              <div class="drawer-field drawer-field-inline">
                <div class="field-label inline-label">搜索范围：</div>
                <div class="row row-wrap search-scope-options" role="radiogroup" aria-label="搜索范围">
                  <button type="button" class="search-scope-option active" data-search-scope="currentFile" role="radio" aria-checked="true">
                    <span class="choice-indicator" aria-hidden="true"></span>
                    <span>当前文件</span>
                  </button>
                  <button type="button" class="search-scope-option" data-search-scope="all" role="radio" aria-checked="false">
                    <span class="choice-indicator" aria-hidden="true"></span>
                    <span>全部文件</span>
                  </button>
                </div>
                <select id="searchScope" hidden>
                  <option value="currentFile">当前文件</option>
                  <option value="all">全部文件</option>
                </select>
              </div>
              <div class="row row-wrap search-secondary-actions">
                <label class="checkbox">
                  <input id="caseSensitive" type="checkbox">
                  大小写敏感
                </label>
                <label class="checkbox">
                  前后文
                  <input id="searchContextLines" type="number" min="0" max="5" step="1" value="2" style="width:64px;">
                  行
                </label>
                <button id="searchResetBtn" class="btn-secondary" type="button">重置</button>
                <button id="searchPrevBtn" class="btn-icon btn-ghost" type="button" title="上一个命中" aria-label="上一个命中" hidden aria-hidden="true">↑</button>
                <button id="searchNextBtn" class="btn-icon btn-ghost" type="button" title="下一个命中" aria-label="下一个命中" hidden aria-hidden="true">↓</button>
              </div>
              <div class="search-feedback">
                <div id="searchConfirmHint" class="search-confirm-hint" hidden></div>
                <div id="historySearchDirtyHint" class="search-draft-hint" hidden></div>
              </div>
            </section>

            <section id="realtimeSearchPanel" class="search-mode-panel" hidden>
              <div class="drawer-field">
                <div class="field-label">关键词</div>
                <div class="row search-input-row">
                  <input id="realtimeKeyword" type="text" placeholder="输入关键词">
                  <button id="realtimeApplyBtn" class="btn-secondary" type="button">开始监控</button>
                  <button id="realtimeStopBtn" class="btn-secondary" type="button">停止监控</button>
                </div>
              </div>
              <div class="row row-wrap search-secondary-actions">
                <label class="checkbox">
                  <input id="realtimeCaseSensitive" type="checkbox">
                  大小写敏感
                </label>
                <label class="checkbox">
                  前后文
                  <input id="realtimeContextLines" type="number" min="0" max="20" step="1" value="0" style="width:64px;">
                  行
                </label>
              </div>
            </section>
          </section>

          <section class="drawer-group drawer-group-results">
            <div class="drawer-group-title"><span>搜索结果</span></div>
            <section id="historyResultsPanel" class="search-results-panel">
              <div class="search-status-stack">
                <div id="searchNavInfo" class="muted small">未执行搜索</div>
                <div id="searchSummary" class="muted small"></div>
              </div>
              <div class="row search-group-tools">
                <button id="searchExpandAllBtn" class="btn-secondary" type="button">展开全部</button>
                <button id="searchCollapseAllBtn" class="btn-secondary" type="button">折叠全部</button>
              </div>
              <div id="searchResults" class="search-results">
                <div class="search-empty-state">
                  <div class="search-empty-title">暂无搜索结果</div>
                  <div class="search-empty-hint">请输入关键词并点击搜索</div>
                </div>
              </div>
            </section>
            <section id="realtimeResultsPanel" class="search-results-panel" hidden>
              <div class="search-status-stack">
                <div id="realtimeSearchNavInfo" class="muted small">实时模式只在主日志区显示过滤结果，不再生成右侧命中列表。</div>
                <div id="realtimeSearchStatus" class="muted small"></div>
                <div id="realtimeSearchHint" class="search-draft-hint" hidden></div>
              </div>
              <div id="realtimeSearchResults" class="search-results"></div>
            </section>
          </section>
        </div>
      </div>
    </aside>
  </section>
</div>

<div id="configModal" class="modal hidden">
  <div class="modal-card">
    <div class="modal-head">
      <div class="modal-title">服务器配置</div>
      <button id="closeConfigBtn" class="btn-icon btn-ghost" type="button" aria-label="关闭">×</button>
    </div>
    <p class="muted small">最小配置：name/host/port/username/password/rootPath。ID 由系统内部管理，默认服务自动取第一个。</p>
    <div id="serverFormList" class="server-form-list"></div>
    <div class="row row-wrap">
      <button id="addServerFormBtn" class="btn-secondary">新增服务器</button>
      <button id="saveConfigBtn" class="btn-primary">保存配置</button>
      <button id="reloadConfigBtn" class="btn-ghost">重新加载</button>
    </div>
  </div>
</div>

<div id="toastContainer" class="toast-container"></div>

<script src="/app.js?v=20260429a"></script>
</body>
</html>
